<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage</title>
  <style>
    :root {
      --bg: #08122b;
      --surface: rgba(255,255,255,0.08);
      --text: #eef3ff;
      --muted: #9fb2d3;
      --accent: #2f8cff;
      --accent-soft: rgba(47,140,255,0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(47,140,255,0.16), transparent 24%),
                  linear-gradient(180deg, #08122b 0%, #0d1c38 100%);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      padding: 18px;
    }

    .screen {
      width: min(380px, 100%);
      border-radius: 36px;
      overflow: hidden;
      background: #0d1b36;
      box-shadow: 0 30px 80px rgba(0,0,0,0.28);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 20px 8px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .profile-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(47,140,255,0.3), rgba(255,255,255,0.08));
      display: grid;
      place-items: center;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .hero {
      padding: 26px 24px 24px;
      display: grid;
      gap: 18px;
    }

    .hero h1 {
      font-size: 2rem;
      line-height: 1.1;
      max-width: 92%;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.7;
      max-width: 94%;
    }

    .input-card {
      margin: 0 20px 24px;
      padding: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      display: grid;
      gap: 12px;
    }

    .input-card p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .input-card textarea {
      width: 100%;
      min-height: 96px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 14px;
      resize: none;
      font-family: inherit;
    }

    .actions {
      display: grid;
      gap: 14px;
      padding: 0 20px 24px;
    }

    .quick-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      color: inherit;
    }

    .quick-link strong {
      font-size: 1rem;
    }

    .quick-link span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .bottom-nav {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 0 20px 20px;
    }

    .nav-btn {
      flex: 1;
      border: none;
      border-radius: 18px;
      padding: 16px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      cursor: pointer;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <button class="icon-btn" onclick="window.location.href='menu.html'">☰</button>
      <button class="profile-btn" onclick="window.location.href='profile.html'">A</button>
    </div>

    <section class="hero">
      <h1>Bem-vinda à Análise de Segurança</h1>
      <p>Como posso ajudar você hoje? Descreva sua situação para uma avaliação.</p>
    </section>

    <div class="input-card">
      <p>Cole um link que você recebeu para verificar se é seguro.</p>
      <textarea placeholder="Digite o link aqui..."></textarea>
    </div>

    <div class="actions">
      <a class="quick-link" href="fraudes.html"><strong>Fraudes</strong><span>Ver alertas recentes</span></a>
      <a class="quick-link" href="profile.html"><strong>Perfil</strong><span>Ver suas informações</span></a>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn" onclick="window.location.href='fraudes.html'">Fraudes</button>
      <button class="nav-btn" onclick="window.location.href='profile.html'">Perfil</button>
      <button class="nav-btn" onclick="window.location.href='menu.html'">Menu</button>
    </div>
  </div>
</body>
</html>
