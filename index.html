<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    :root {
      --bg: #08122b;
      --surface: rgba(255,255,255,0.08);
      --text: #eef3ff;
      --muted: #9fb2d3;
      --accent: #2f8cff;
      --accent-dark: #1959b0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(47,140,255,0.16), transparent 22%),
                  linear-gradient(180deg, #08122b 0%, #0d1c38 100%);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .screen {
      width: min(380px, 100%);
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.28);
      background: #0e1c3a;
    }

    .hero {
      position: relative;
      padding: 30px 26px 26px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(47,140,255,0.2), transparent 70%);
    }

    .hero::before {
      content: '';
      position: absolute;
      right: -40px;
      top: -30px;
      width: 140px;
      height: 140px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }

    .hero::after {
      content: '';
      position: absolute;
      left: -40px;
      top: 40px;
      width: 180px;
      height: 180px;
      background: rgba(47,140,255,0.15);
      border-radius: 50%;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .brand-marker {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
    }

    .brand-title {
      font-size: 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .hero h1 {
      font-size: 2.2rem;
      line-height: 1.05;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.7;
      max-width: 260px;
      position: relative;
      z-index: 1;
    }

    .content {
      padding: 24px 26px 30px;
      display: grid;
      gap: 16px;
      background: #0c1a34;
    }

    .input-group {
      display: grid;
      gap: 10px;
    }

    label {
      font-size: 0.82rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 16px;
      font-size: 0.95rem;
    }

    input::placeholder {
      color: rgba(255,255,255,0.52);
    }

    .checkbox-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .checkbox-row input {
      width: auto;
      margin-right: 8px;
    }

    .button-primary {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 18px 30px rgba(47,140,255,0.2);
    }

    .secondary-link {
      text-align: center;
      display: block;
      color: #a8c7ff;
      text-decoration: none;
      font-size: 0.92rem;
    }

    .error {
      color: #ff7a7a;
      font-size: 0.85rem;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <main class="screen">
    <section class="hero">
      <div class="brand">
        <span class="brand-marker">M</span>
        <div>
          <div class="brand-title">MONEY</div>
        </div>
      </div>
      <h1>Bem-vindo de volta</h1>
      <p>Faça login para continuar acessando sua conta e as suas finanças.</p>
    </section>

    <section class="content">
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="text" id="email" placeholder="seu@email.com">
        <div id="erroEmail" class="error"></div>
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Sua senha">
      </div>

      <div class="checkbox-row">
        <label><input type="checkbox" id="mostrarSenha"> Mostrar senha</label>
        <a href="#" class="secondary-link" onclick="recuperar(); return false;">Esqueceu a senha?</a>
      </div>

      <button class="button-primary" onclick="login()">Entrar</button>
      <a href="signup.html" class="secondary-link">Não tem uma conta? Cadastre-se</a>
    </section>
  </main>

  <script>
    function login() {
      let email = document.getElementById("email").value.trim();
      let senha = document.getElementById("senha").value;
      document.getElementById("erroEmail").innerText = "";

      if (!email.includes("@")) {
        document.getElementById("erroEmail").innerText = "Digite um e-mail válido.";
        return;
      }

      if (email === "teste@gmail.com" && senha === "123") {
        window.location.href = "home.html";
      } else {
        alert("Email ou senha incorretos.");
      }
    }

    document.getElementById("mostrarSenha").addEventListener("change", function() {
      let senha = document.getElementById("senha");
      senha.type = this.checked ? "text" : "password";
    });

    function recuperar() {
      alert("Fluxo de recuperação de senha ainda não implementado.");
    }
  </script>
</body>
</html>
