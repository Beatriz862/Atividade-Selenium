<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>
  <style>
    :root {
      --bg: #08122b;
      --surface: rgba(255,255,255,0.08);
      --text: #eef3ff;
      --muted: #9fb2d3;
      --accent: #2f8cff;
      --card: #0d1b36;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #08122b 0%, #0d1c38 100%);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      padding: 18px;
    }

    .drawer {
      width: min(360px, 100%);
      background: #0d1b36;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.28);
      display: grid;
      gap: 18px;
    }

    .header {
      padding: 22px 22px 16px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .back {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      display: grid;
      place-items: center;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .user-card {
      padding: 18px 22px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: radial-gradient(circle at top left, rgba(47,140,255,0.28), rgba(0,0,0,0.08));
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
    }

    .user-text strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .user-text span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .menu-list {
      display: grid;
      gap: 14px;
      padding: 0 18px 0 18px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      color: inherit;
    }

    .menu-item .label {
      display: grid;
      gap: 4px;
    }

    .menu-item .label strong {
      font-size: 1rem;
    }

    .menu-item .label span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .menu-item .icon {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: rgba(47,140,255,0.16);
      display: grid;
      place-items: center;
      font-size: 1.1rem;
    }

    .signout {
      margin: 0 18px 22px;
      padding: 16px;
      border: none;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="drawer">
    <div class="header">
      <button class="back" onclick="window.history.back()">←</button>
    </div>
    <div class="user-card">
      <div class="avatar">E</div>
      <div class="user-text">
        <strong>Emma Ashley</strong>
        <span>@emma_ashley</span>
      </div>
    </div>

    <div class="menu-list">
      <a href="fraudes.html" class="menu-item">
        <div class="icon">🛡</div>
        <div class="label"><strong>Principais fraudes</strong><span>Veja as maiores ameaças</span></div>
        <div>›</div>
      </a>
      <a href="#" class="menu-item">
        <div class="icon">⚠</div>
        <div class="label"><strong>Denúncias</strong><span>Registrar um incidente</span></div>
        <div>›</div>
      </a>
      <a href="#" class="menu-item">
        <div class="icon">🎫</div>
        <div class="label"><strong>Seus tickets</strong><span>Ver pedidos abertos</span></div>
        <div>›</div>
      </a>
      <a href="#" class="menu-item">
        <div class="icon">💡</div>
        <div class="label"><strong>Promoções</strong><span>Ofertas disponíveis</span></div>
        <div>›</div>
      </a>
    </div>

    <button class="signout" onclick="window.location.href='index.html'">Sign Out</button>
  </div>
</body>
</html>
